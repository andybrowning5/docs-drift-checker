name: docs-drift-checker
display_name: Docs Drift Checker
version: 0.2.0
description: >
  Scans a codebase against its docs and finds drift — wrong signatures, stale
  references, missing docs for new features. Fixes issues directly using
  Edit and Write tools, then produces a report of what was changed.
category: coding
tags: [documentation, code-quality, drift, review, audit]
author:
  name: Andy Browning
  github: andybrowning5

runtime:
  language: node
  run_command: node bundle.mjs 2>/dev/null || node src/agent.js
  setup_command: npm install && (command -v claude >/dev/null 2>&1 || npm install -g @anthropic-ai/claude-code)
  dependencies: package.json
  default_model:
    provider: anthropic
    model: claude-haiku-4-5-20251001
  resources:
    max_memory: 2GB
    max_cpu: 2
    max_time: 30m

permissions:
  filesystem:
    workspace: readwrite
  network:
    - domain: api.anthropic.com
      reason: LLM inference for code and documentation analysis
  delegation:
    enabled: false

keys:
  - provider: anthropic
    env_var: ANTHROPIC_API_KEY
    required: true
