name: docs-drift-checker
display_name: Docs Drift Checker
version: 0.1.0
description: >
  Scans a codebase against its docs and finds drift — wrong signatures, stale
  references, missing docs for new features. Produces a prioritized report
  with exact locations and suggested fixes. Read-only.
category: coding
tags: [documentation, code-quality, drift, review, audit]
author:
  name: Andy Browning
  github: andybrowning5

runtime:
  language: node
  run_command: node bundle.mjs 2>/dev/null || node src/agent.js
  setup_command: test -f bundle.mjs || npm install
  dependencies: package.json
  default_model:
    provider: anthropic
    model: claude-haiku-4-5-20251001
  resources:
    max_memory: 2GB
    max_cpu: 2
    max_time: 30m

permissions:
  filesystem:
    workspace: readonly
  network:
    - domain: api.anthropic.com
      reason: LLM inference for code and documentation analysis
  delegation:
    enabled: false

keys:
  - provider: anthropic
    env_var: ANTHROPIC_API_KEY
    domain: api.anthropic.com
    auth_style: x-api-key
    required: true
